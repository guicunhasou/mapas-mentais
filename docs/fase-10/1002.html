<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2 - Modelagem de Negócios e Frameworks</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111111;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #mindmap {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    .markmap > svg {
      width: 100%;
      height: 100%;
      background: #ebebeb;
    }
  </style>
</head>
<body>
  <svg id="mindmap"></svg>

  <script type="module">
    import { Markmap, loadCSS, loadJS } from 'https://cdn.jsdelivr.net/npm/markmap-view@0.17.6/+esm';
    import { Transformer } from 'https://cdn.jsdelivr.net/npm/markmap-lib@0.17.6/+esm';

    const markdown = String.raw`---
markmap:
  initialExpandLevel: 3
---

# 2
## Modelagem de Negócios e Frameworks

- Business Model Generation
  - Autores: Osterwalder e Pigneur
  - Foco em inovação prática e visual
  - Popularidade em Startups e grandes empresas
- Modelo vs. Plano de Negócio
  - Plano de Negócio
    - Negócios tradicionais
    - Receita de bolo estruturada
    - Baseado em históricos preexistentes
  - Modelo de Negócio
    - Ambiente de incertezas
    - Soluções inovadoras e escaláveis
    - Rascunho testável e mutável
- Canvas da Proposta de Valor
  - Lado Direito: Cliente
    - Tarefas do Cliente (Jobs to be done)
    - Dores (Obstáculos e problemas)
    - Ganhos (Expectativas e desejos)
  - Lado Esquerdo: Valor
    - Produtos e Serviços
    - Aliviadores de Dores
    - Criadores de Ganhos
  - Estratégia de Diferenciação
    - Percepção de valor pelo cliente
    - Atributos exclusivos
    - Fuga da briga por menor preço
- Business Model Canvas (9 Elementos)
  - Lado Direito (Valor/Receita)
    - Segmentos de Clientes
    - Proposta de Valor
    - Canais
    - Relacionamento com Clientes
    - Fontes de Receita
  - Lado Esquerdo (Eficiência/Custos)
    - Recursos-Chave
    - Atividades-Chave
    - Parceiros-Chave
    - Estrutura de Custos
- Processo de Validação
  - Transformar hipóteses em fatos
  - Interação direta com o mercado
  - Aprendizagem e ajuste (Pivotar)
  - Redução de riscos do projeto
`;

    const transformer = new Transformer();
    const { root, features } = transformer.transform(markdown);
    const { styles, scripts } = transformer.getUsedAssets(features);

    if (styles?.length) loadCSS(styles);
    if (scripts?.length) await loadJS(scripts);

    Markmap.create('#mindmap', {
      autoFit: true,
      initialExpandLevel: 3,
      maxWidth: 320,
      paddingX: 16
    }, root);
  </script>
</body>
</html>
