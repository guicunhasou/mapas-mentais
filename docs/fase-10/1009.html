# 1009
## Vida Longa ao App

- Importância da Manutenção
  - Melhoria contínua
  - Correção de erros
  - Performance e estabilidade
  - Compatibilidade com SO
  - Engajamento do usuário
- Gestão de Versões
  - Semantic Versioning (SemVer)
  - Sistemas Centralizados
  - Sistemas Distribuídos
  - Automatização CI/CD
- Distribuição de Atualizações
  - Lojas (App Store e Google Play)
  - Over-the-Air (OTA) / CodePush
- Ferramentas de Suporte e Feedback
  - Coleta de Feedback
    - SurveyMonkey
    - Typeform
    - Google Forms
  - Monitoramento de Erros
    - Firebase Crashlytics
    - Sentry
  - Análise de Performance
    - Google Analytics
    - Mixpanel
    - Heap
- Estratégias Proativas
  - Testes em versões Beta
  - Auditoria de segurança
  - Atualização de bibliotecas
  - Evolução funcional guiada
- Tipos de Atualizações
  - Incrementais (Bugs/Layout)
  - Grandes atualizações (Features)
  - Segurança (Criptografia/Patches)
  - Silenciosas (Background)
  - Conteúdo (Streaming/Jogos)
- Experiência do Usuário (UX)
  - Construção de confiança
  - Riscos de mudanças abruptas
  - Testes A/B e gradativos
  - Tutoriais In-App
  - Evitar Dark Patterns
